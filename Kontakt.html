<!-- JS für Weiterleitung nach erfolgreichem Absenden -->
<script>
const form = document.getElementById('contact-form');

form.addEventListener('submit', function(event) {
    event.preventDefault(); // Stoppt das Standardformular

    const formData = new FormData(form);

    fetch(form.action, {
        method: 'POST',
        body: formData,
        headers: { 'Accept': 'application/json' }
    }).then(response => {
        if (response.ok) {
            // Erfolgreich gesendet → Weiterleitung
            window.location.href = 'https://the-fire-dart.github.io/Danke.html';
        } else {
            alert("Fehler beim Senden. Bitte versuchen Sie es erneut.");
        }
    }).catch(error => {
        alert("Fehler beim Senden. Bitte versuchen Sie es erneut.");
    });
});
</script>
